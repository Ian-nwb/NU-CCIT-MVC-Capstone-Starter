name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install
      working-directory: ./backend

    - name: Run tests (if any)
      run: echo "No tests configured for backend yet."
      working-directory: ./backend

    - name: Build (if applicable)
      run: echo "No explicit build step for Node.js backend, dependencies are installed."
      working-directory: ./backend
